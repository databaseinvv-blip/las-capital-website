  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

Fdiv>\n          <div style=\"position:relative;width:190px;height:190px;border-radius:50%;background:conic-gradient(#A9853B 0 266.4deg,#3A4048 266.4deg 291.6deg,#C6A45C 291.6deg 360deg)\">\n            <div style=\"position:absolute;inset:30px;border-radius:50%;background:#FFFFFF\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 9px; width: 270px\">\n            <sc-for list=\"{{ compVintage }}\" as=\"c\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;align-items:center;gap:10px;font-size:13px\"><span style=\"width:11px;height:11px;flex-shrink:0;background:{{ c.c }}\"><\u002Fspan><span style=\"color:rgba(26,29,34,.78);flex:1\">{{ c.name }}<\u002Fspan><span style=\"font-weight:700;color:#A9853B\">{{ c.val }}<\u002Fspan><\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:12px;color:rgba(26,29,34,.45);margin-top:44px;line-height:1.7\" data-reveal=\"\">1. As of 11 March 2026. Fund composition charts based on capital deployed and may not sum to 100% due to rounding.&nbsp;&nbsp; 2. Vintage year represents the weighted-average at time of investment made.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Portfolio -->\n  <div style=\"background:#F2EFE8;color:#1A1D22\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:100px 36px\">\n    <div style=\"margin-bottom:56px\" data-reveal=\"\">\n      <div style=\"font-size:12.5px;font-weight:600;letter-spacing:.3em;color:#A9853B;text-transform:uppercase;margin-bottom:22px\">Active Investments<\u002Fdiv>\n      <h2 style=\"font-family:'Archivo',sans-serif;font-weight:700;letter-spacing:-.01em;font-size:42px;line-height:1.2;margin:0\">Top Performing Portfolio<\u002Fh2>\n      <p style=\"font-size:16px;line-height:1.75;color:rgba(26,29,34,.68);margin:22px 0 0;max-width:620px\">A selection of our active investments across two regions. For confidentiality, portfolio ize:22px;line-height:1.3;margin-bottom:10px\">{{ d.title }}<\u002Fdiv>\n            <p style=\"font-size:14px;line-height:1.7;color:rgba(26,29,34,.62);margin:0\">{{ d.desc }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:auto;padding-top:8px\">\n            <span style=\"font-size:11.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(26,29,34,.5)\">{{ d.meta }}<\u002Fspan>\n            <span style=\"display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#A9853B\">Download <span style=\"font-size:16px\">↓<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ FOOTER ============ -->\n<div style=\"background:#0A0C0F;color:#F2EFE8\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:64px 36px 48px;display:flex;flex-direction:column;gap:36px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:center;gap:32px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:13px\">\n        <img src=\"84b5f01d-c4cf-441c-8067-40f86f96cb5e\" alt=\"LAS Capital\" style=\"width:36px;height:36px;object-fit:contain\">\n        <span style=\"font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;letter-spacing:.18em;white-space:nowrap\">LAS CAPITAL<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:30px;font-size:12.5px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(242,239,232,.65)\">\n        <a sc-camel-on-click=\"{{ goHome }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Home<\u002Fa>\n        <a sc-camel-on-click=\"{{ goAbout }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">About<\u002Fa>\n        <a sc-camel-on-click=\"{{ goFund }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">The Fund<\u002Fa>\n        <a sc-camel-on-click=\"{{ goPortfolio }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Portfolio<\u002Fa>\n        <a sc-camel-on-click=\"{{ goTeam }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Leadership<\u002Fa>\n        <a sc-camel-on-click=\"{{ goCareers }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Careers<\u002Fa>\n        <a sc-camel-on-click=\"{{ goAnnouncements }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Announcements<\u002Fa>\n        <a sc-camel-on-click=\"{{ goNewsroom }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Newsroom<\u002Fa>\n        <a sc-camel-on-click=\"{{ goForms }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Forms<\u002Fa>\n        <a sc-camel-on-click=\"{{ goContact }}\" style=\"cursor:pointer;color:rgba(242,239,232,.65)\" style-hover=\"color:#C6A45C\">Contact<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:11.5px;line-height:1.7;color:rgba(242,239,232,.35);margin:0;max-width:1020px\">This website has been prepared for informational purposes only and does not constitute the solicitation of investments or securities. The Fund is offered exclusively to Sophisticated Investors as defined under Part 1 of Schedule 7 of the Capital Markets and Services Act 2007. Prospective investors should undertake their own due diligence and consideration at their own risk. Past performance is not indicative of future results.<\u002Fp>\n    <div style=\"display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap;font-size:12px;color:rgba(242,239,232,.4)\">\n      <div>© 2026 LAS Capital. All rights reserved.<\u002Fdiv>\n      <div>Investment Manager: Aureus Strategies PE Sdn Bhd · Regulated by the Securities Commission Malaysia<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showPerformance&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Content&quot;}}\">\nclass Component extends DCLogic {\n  state = { page: 'home', openProject: -1, companyOpen: false, resourcesOpen: false, annPage: 1, openAnn: null };\n\n  go(page) {\n    this.setState({ page, openAnn: null }, () => {\n      window.scrollTo(0, 0);\n      requestAnimationFrame(() => this.setupReveals());\n    });\n  }\n\n  setupReveals() {\n    const els = document.querySelectorAll('[data-reveal]:not([data-revealed])');\n    if (!this._io) {\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            e.target.style.opacity = '1';\n            e.target.style.transform = 'none';\n            this._io.unobserve(e.target);\n          }\n        });\n      }, { threshold: 0.1 });\n    }\n    els.forEach((el) => {\n      el.setAttribute('data-revealed', '1');\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(28px)';\n      el.style.transition = 'opacity .8s ease, transform .8s ease';\n      this._io.observe(el);\n    });\n  }\n\n  componentDidMount() {\n    this.setupReveals();\n  }\n\n  componentDidUpdate() {\n    requestAnimationFrame(() => this.setupReveals());\n  }\n\n  projects() {\n    return [\n      { name: 'Coconut Plantation Operator', sector: 'Plantation', region: 'Malaysia', instrument: 'Private Equity', status: 'Active', desc: 'An investment-driven agribusiness cultivating coconut across multiple estates in Malaysia. The mandate focuses on land asset optimization, yield enhancement and integration into the downstream supply chain, applying institutional investment discipline to a traditional agricultural sector.' },\n      { name: 'Durian Plantation Venture', sector: 'Plantation', region: 'Malaysia', instrument: 'Private Equity', status: 'Active', desc: 'A premium durian plantation development positioned for the fast-growing regional export market. The investment covers estate development and orchard management, with value creation driven by maturing yield profiles and rising demand for premium cultivars.' },\n      { name: 'Listed Dental Services Group', sector: 'Healthcare', region: 'Hong Kong', instrument: 'Listed Equity', status: 'Active', desc: 'A dental services group listed on the Hong Kong Stock Exchange, operating a network of clinics serving a growing base of private-pay patients. The position provides exposure to resilient healthcare demand with the liquidity and governance standards of a public listing.' },\n      { name: 'Listed Creative & Lifestyle Group', sector: 'Consumer', region: 'Hong Kong', instrument: 'Listed Equity', status: 'Active', desc: 'A creative and lifestyle holding group listed on the Hong Kong Stock Exchange. The position was taken on a value basis, backing an established brand platform with recovery and growth prospects across its consumer-facing businesses.' },\n      { name: 'F&B Retail Chain', sector: 'Food & Beverage', region: 'Malaysia', instrument: 'Private Equity', status: 'Active', desc: 'A food and beverage retail concept with outlet operations in Malaysia. The investment supports outlet expansion, brand building and supply chain standardization, targeting the defensive, cash-generative economics of everyday dining.' },\n      { name: 'Wellness E-Commerce Brand', sector: 'Consumer Health', region: 'Regional', instrument: 'Private Equity', status: 'Active', desc: 'A direct-to-consumer e-commerce brand specialising in cooling patch and wellness products, sold across regional online marketplaces. The mandate backs a capital-light model with strong repeat-purchase dynamics and room for category extension.' },\n      { name: 'Smart Device Rental Platform', sector: 'Technology', region: 'Malaysia', instrument: 'Private Equity', status: 'Active', desc: 'A rental platform for PCs, laptops and smart devices serving businesses and consumers. Recurring subscription revenue and asset redeployment underpin the model, riding the shift from device ownership to device-as-a-service.' }\n    ];\n  }\n\n  news() {\n    return [\n      { id: 'news-1', type: 'article', category: 'Market Outlook', title: \"Q2'2026 Market Outlook | Managing Converging Risks\", date: 'Apr 01, 2026', iso: '2026-04-01' },\n      { id: 'news-3', type: 'article', category: 'Market Review', title: 'Monthly Market Review | February 2026', date: 'Mar 04, 2026', iso: '2026-03-04' },\n      { id: 'news-4', type: 'article', category: 'Geopolitics', title: 'Middle East Tensions | Market Implications', date: 'Mar 02, 2026', iso: '2026-03-02' },\n      { id: 'news-5', type: 'article', category: 'Sector Spotlight', title: 'Healthcare Resilience in a Slowing Cycle', date: 'Feb 18, 2026', iso: '2026-02-18' },\n      { id: 'ann-jun26', type: 'announcement', category: 'Dividend Distribution', title: 'June 2026 Income Distribution', date: 'Jun 2026', iso: '2026-06-30',\n        summary: '50% of expected return · 10%–12% p.a. funds · MYR & Multicurrency',\n        body: \"For the distribution period ending June 2026, income distributions are declared across the Fund's multiple sub-funds, each carrying its own expected annual return — ranging from 10% per annum to 12% per annum. In line with the Fund's semi-annual schedule, every Unit Holder receives 50% of their respective expected annual return for this period. Distributions apply to both the MYR and Multicurrency classes.\" },\n      { id: 'ann-dec25', type: 'announcement', category: 'Dividend Distribution', title: 'December 2025 Income Distribution', date: 'Dec 2025', iso: '2025-12-31',\n        summary: '7.00% p.a. (MYR) · 6.00% p.a. (Multicurrency)',\n        body: \"For the distribution period ending December 2025, the Fund declares an income distribution of 7.00% per annum for the MYR class and 6.00% per annum for the Multicurrency class, closing the year in line with the Fund's targeted income objective.\" },\n      { id: 'ann-jun25', type: 'announcement', category: 'Dividend Distribution', title: 'June 2025 Income Distribution', date: 'Jun 2025', iso: '2025-06-30',\n        summary: '6.00% p.a. (MYR)',\n        body: 'For the distribution period ending June 2025, the Fund declares an income distribution of 6.00% per annum for the MYR class, maintaining consistent semi-annual returns to Unit Holders.' },\n      { id: 'ann-dec24', type: 'announcement', category: 'Dividend Distribution', title: 'December 2024 Income Distribution', date: 'Dec 2024', iso: '2024-12-31',\n        summary: '7.08% p.a. (MYR) · 6.08% p.a. (Multicurrency)',\n        body: 'For the distribution period ending December 2024, the Fund declares an income distribution of 7.08% per annum for the MYR class and 6.08% per annum for the Multicurrency class, reflecting a strong second-half performance across the portfolio.' },\n      { id: 'ann-jun24', type: 'announcement', category: 'Dividend Distribution', title: 'June 2024 Income Distribution', date: 'Jun 2024', iso: '2024-06-30',\n        summary: '6.00% p.a. (MYR)',\n        body: \"For the distribution period ending June 2024, the Fund declares its income distribution equivalent to 6.00% per annum for the MYR class, in line with the Fund's targeted stable income return.\" }\n    ];\n  }\n\n  documents() {\n    return [\n      { id: 'doc-im', title: 'Information Memorandum', desc: 'Full fund terms, strategy and risk disclosures.', meta: 'PDF · Confidential', href: '#' },\n      { id: 'doc-ts', title: 'Term Sheet', desc: 'Summary of key commercial terms of the Fund.', meta: 'PDF · 2 pages', href: '#' },\n      { id: 'doc-cp', title: 'Company Profile', desc: 'Overview of LAS Capital and the investment team.', meta: 'PDF · Brochure', href: '#' }\n    ];\n  }\n\n  renderVals() {\n    const p = this.state.page;\n    const byDateDesc = (a, b) => b.iso.localeCompare(a.iso);\n    const all = this.news().map((n) => ({ ...n, go: () => this.go(n.type === 'announcement' ? 'announcements' : 'newsroom'), isArticle: n.type === 'article', isAnnouncement: n.type === 'announcement' }));\n    const announcements = all.filter((n) => n.type === 'announcement').sort(byDateDesc).map((n) => ({\n      ...n,\n      readMore: () => { this.setState({ openAnn: n.id }, () => { window.scrollTo(0, 0); requestAnimationFrame(() => this.setupReveals()); }); }\n    }));\n    const annDetail = announcements.find((a) => a.id === this.state.openAnn) || null;\n    const ANN_PER_PAGE = 5;\n    const annPages = Math.max(1, Math.ceil(announcements.length / ANN_PER_PAGE));\n    const annCur = Math.min(Math.max(1, this.state.annPage), annPages);\n    const pagedAnnouncements = announcements.slice((annCur - 1) * ANN_PER_PAGE, annCur * ANN_PER_PAGE);\n    const annPageButtons = Array.from({ length: annPages }, (_, i) => ({\n      n: i + 1,\n      active: (i + 1) === annCur,\n      bg: (i + 1) === annCur ? '#C6A45C' : '#FFFFFF',\n      fg: (i + 1) === annCur ? '#0E1013' : 'rgba(26,29,34,.7)',\n      bd: (i + 1) === annCur ? '#C6A45C' : 'rgba(26,29,34,.2)',\n      go: () => { this.setState({ annPage: i + 1 }, () => { window.scrollTo(0, 0); requestAnimationFrame(() => this.setupReveals()); }); }\n    }));\n    const articles = all.filter((n) => n.type === 'article').sort(byDateDesc);\n    const newsHome = all.filter((n) => n.type === 'announcement' || n.type === 'article').sort(byDateDesc).slice(0, 4);\n    return {\n      announcements,\n      pagedAnnouncements,\n      annPageButtons,\n      annHasPages: annPages > 1,\n      annDetail: annDetail || {},\n      showAnnDetail: !!annDetail,\n      showAnnList: !annDetail,\n      backToAnnouncements: () => this.setState({ openAnn: null }),\n      articles,\n      documents: this.documents(),\n      newsHome,\n      isAnnouncements: p === 'announcements',\n      isNewsroom: p === 'newsroom',\n      isForms: p === 'forms',\n      goAnnouncements: () => this.go('announcements'),\n      goNewsroom: () => this.go('newsroom'),\n      goForms: () => this.go('forms'),\n      resourcesMenuDisplay: this.state.resourcesOpen ? 'block' : 'none',\n      openResources: () => this.setState({ resourcesOpen: true }),\n      closeResources: () => this.setState({ resourcesOpen: false }),\n      isHome: p === 'home',\n      isAbout: p === 'about',\n      isFund: p === 'fund',\n      isTeam: p === 'team',\n      portfolioRows: (() => {\n        const open = this.state.openProject;\n        const cards = this.projects().map((it, i) => ({\n          rpu: 'RM 0.01 / unit',\n          ...it,\n          num: String(i + 1).padStart(2, '0'),\n          cardBorder: open === i ? 'rgba(198,164,92,.55)' : 'rgba(242,239,232,.1)',\n          cardBorderLight: open === i ? 'rgba(198,164,92,.7)' : 'rgba(26,29,34,.1)',\n          cta: open === i ? 'Hide Details' : 'View Details →',\n          toggle: () => this.setState((s) => ({ openProject: s.openProject === i ? -1 : i }))\n        }));\n        const rows = [];\n        for (let r = 0; r < cards.length; r += 3) {\n          const inRow = open >= r && open < r + 3;\n          rows.push({\n            cards: cards.slice(r, r + 3),\n            hasOpen: inRow,\n            openPf: inRow ? cards[open] : {}\n          });\n        }\n        return rows;\n      })(),\n      closeProject: () => this.setState({ openProject: -1 }),\n      isContact: p === 'contact',\n      isCareers: p === 'careers',\n      goCareers: () => this.go('careers'),\n      isPortfolio: p === 'portfolio',\n      goPortfolio: () => this.go('portfolio'),\n      companyMenuDisplay: this.state.companyOpen ? 'block' : 'none',\n      openCompany: () => this.setState({ companyOpen: true }),\n      closeCompany: () => this.setState({ companyOpen: false }),\n      fullTimeCount: '4',\n      internCount: '2',\n      fullTimeJobs: [\n        {\n          title: 'Account Admin',\n          tagline: 'Finance · Project Accounting',\n          scope: [\n            'Prepare project-based profit & loss statements across the fund\\'s portfolio companies.',\n            'Maintain accurate books, ledgers and reconciliations for each investment vehicle.',\n            'Support month-end close, management reporting and audit requirements.'\n          ],\n          reqs: [\n            'Diploma or Degree in Accounting, Finance or a related field.',\n            'Proficiency in accounting software and Microsoft Excel.',\n            'Strong attention to detail and ability to manage multiple projects.'\n          ]\n        },\n        {\n          title: 'Fund Admin',\n          tagline: 'Fund Operations · Documentation',\n          scope: [\n            'Prepare and maintain project and fund documentation, records and filings.',\n            'Coordinate investor onboarding, subscription and redemption paperwork.',\n            'Liaise with legal, compliance and external service providers to keep records current.'\n          ],\n          reqs: [\n            'Diploma or Degree in Finance, Business Administration or a related field.',\n            'Highly organised with strong written and documentation skills.',\n            'Familiarity with fund or corporate administration is an advantage.'\n          ]\n        },\n        {\n          title: 'Corporate & Institutional Sales',\n          tagline: 'Deal Sourcing · Investor Relations',\n          scope: [\n            'Source and originate investment projects and opportunities for the fund.',\n            'Manage and grow relationships with corporate and institutional investors.',\n            'Steward active projects from introduction through to ongoing management.'\n          ],\n          reqs: [\n            'Degree in Business, Finance or a related field.',\n
